{{ define "main" }}
<section class="hero hero-compact">
  <p class="hero-eyebrow">// {{ .Section }}</p>
  <h1 class="hero-title">{{ .Title }}</h1>
</section>

<section class="post-list">
  {{ range .Pages }}
  <article class="post-card">
    <a href="{{ .Permalink }}" class="post-card-link">
      <div class="post-card-top">
        <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        {{ with .Params.tags }}
        <div class="post-tags">
          {{ range . }}<span class="tag-pill">{{ . }}</span>{{ end }}
        </div>
        {{ end }}
      </div>
      <h2 class="post-card-title">{{ .Title }}</h2>
      <p class="post-card-excerpt">{{ .Summary }}</p>
      <span class="post-card-readmore">read entry →</span>
    </a>
  </article>
  {{ else }}
  <p class="empty-state">Nothing here yet.</p>
  {{ end }}
</section>
{{ end }}
